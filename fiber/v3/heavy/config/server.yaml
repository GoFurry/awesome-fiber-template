# Cluster node id used by the snowflake generator.
cluster_id: 1

# Server settings.
server:
  app_id: "awesome-fiber-template"
  app_name: "Awesome Fiber Template"
  app_version: "v1.0.0"
  mode: "debug"
  ip_address: "127.0.0.1"
  port: "9999"
  memory_limit: 1
  gc_percent: 1000
  network: "tcp"
  enable_prefork: false
  is_full_stack: false

# Global auth settings.
auth:
  auth_salt: "ChangeMeTemplateSalt"
  jwt_secret: "ChangeMeTemplateSecret"

# TLS certificate paths.
key:
  tls_key: "./config/tls.key"
  tls_pem: "./config/tls.pem"

# Redis settings.
redis:
  enabled: false
  redis_addr: "127.0.0.1:6379"
  redis_password: "123456"

# Database settings.
database:
  enabled: true
  auto_migrate: true
  db_type: "sqlite"
  sqlite:
    dsn: ""
    path: "./data/app.db"
  postgres:
    dsn: ""
    db_name: "app"
    db_username: "postgres"
    db_password: "123456"
    db_host: "127.0.0.1"
    db_port: "5432"
  mysql:
    dsn: ""
    db_name: "app"
    db_username: "root"
    db_password: "123456"
    db_host: "127.0.0.1"
    db_port: "3306"

# Metrics settings.
prometheus:
  enabled: false
  url: "http://127.0.0.1:9090"
  auth_name: ""
  auth_pass: ""
  namespace: "awesome_fiber_template"
  path: "/metrics"
  service_metrics: ["awesome_template"]

# Log settings.
log:
  log_max_size: 100
  log_max_backups: 30
  log_max_age: 7
  log_level: "debug"
  log_mode: "dev"
  log_path: "./logs/app.log"

# Middleware settings.
middleware:
  swagger:
    enabled: false
    file_path: "./docs/swagger.json"
    base_path: "/"
    path: "/swagger"
    title: "awesome-fiber-template"
  cors:
    allow_origins: ["http://127.0.0.1:8888"]
  limiter:
    enabled: true
    max_requests: 3000
    expiration: 60

# WAF settings.
waf:
  enabled: false
  conf_path: ["./config/coraza.conf"]

# Scheduler settings.
schedule:
  enabled: false

# Outbound proxy settings.
proxy:
  url: "http://127.0.0.1:7897"
  name: ""
  pass: ""
