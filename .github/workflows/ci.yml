name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fiber-v3:
    name: Fiber v3 Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true
          cache-dependency-path: |
            v3/**/go.sum
            v3/**/go.mod

      - name: Run checks
        run: bash .github/scripts/check-framework.sh v3
