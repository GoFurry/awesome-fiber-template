name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generator:
    name: Generator Root
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fiberx
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fiberx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: fiberx
          MYSQL_USER: fiberx
          MYSQL_PASSWORD: fiberx
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -ufiberx -pfiberx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      FIBERX_TEST_PGSQL_DSN: host=127.0.0.1 port=5432 dbname=fiberx user=postgres password=postgres sslmode=disable
      FIBERX_TEST_MYSQL_DSN: fiberx:fiberx@tcp(127.0.0.1:3306)/fiberx?parseTime=true&multiStatements=true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            go.sum
            go.mod

      - name: Run root generator tests
        run: go test ./...

  fiber-v3:
    name: Fiber v3 Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            v3/**/go.sum
            v3/**/go.mod

      - name: Run checks
        run: bash .github/scripts/check-framework.sh v3

      - name: Run template contracts
        run: bash .github/scripts/check-v3-contracts.sh

      - name: Run extra-light race checks
        run: |
          cd v3/extra-light
          go test -race ./...

  centralized-tests:
    name: Centralized Template Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            v3/test/go.sum
            v3/test/go.mod

      - name: Run centralized tests
        run: |
          cd v3/test
          go test ./...
          go vet ./...
          go test -race ./...

  addons:
    name: Addons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            addons/**/go.sum
            addons/**/go.mod

      - name: Run addon checks
        run: bash .github/scripts/check-framework.sh addons
