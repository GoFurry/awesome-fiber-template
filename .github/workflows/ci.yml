name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fiber:
    name: Fiber Templates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true
          cache-dependency-path: |
            fiber/**/go.sum
            fiber/**/go.mod

      - name: Run checks
        run: bash .github/scripts/check-framework.sh fiber

  chi:
